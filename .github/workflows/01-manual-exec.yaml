# CI de Nível 01 - Disparo Manual através de clique

#nome da pipeline
name: 'Execução Manual'

# gatilhos / triggers - regras de disparo
# gatinho manual = workflow_dispatch
on:
  workflow_dispatch:

# Tarefas dentro da pipeline
jobs:
  # nome do job
  e2e-tests:
    # maquina onde o job vai rodar
    runs-on: ubuntu-latest

    # passos do job
    steps:
      # clone do projeto
      - uses: actions/checkout@v4

      # instalação do node
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x

      # instação do Yarn
      - name: Instalando Yarn
        run: npm install -g yarn

      # instalação das dependencias
      - name: Instalando dependencias
        run: yarn

      # instalação dos browsers do Playwright
      - name: Instalando Browsers do Playwright
        run: yarn playwright install

      # executar os testes e2e
      - name: Executando Testes e2e
        run: yarn run e2e
