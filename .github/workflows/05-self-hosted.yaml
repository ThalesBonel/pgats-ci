# Exercício 3 - Self-Hosted Runner

name: 'Self-Hosted Runner'

on:
  workflow_dispatch:

jobs:
  e2e-tests:
    # Única mudança em relação aos outros workflows: aponta para o runner local
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Verificar versão do Node.js
        run: node --version

      - name: Instalando Yarn
        run: npm install -g yarn

      - name: Instalando dependencias
        run: yarn

      - name: Instalando Chromium do sistema
        run: sudo snap install chromium || sudo apt-get install -y chromium-browser

      - name: Executando Testes e2e
        run: yarn run e2e
        env:
          CHROMIUM_PATH: /snap/bin/chromium

      - name: Upload Relatório HTML do Playwright
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-self-hosted
          path: playwright-report/
          retention-days: 7
